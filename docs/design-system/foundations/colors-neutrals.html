<!-- @dsCard group="Colors" viewport="700x150" name="Neutres & surfaces" subtitle="Fonds, texte, bordures — teintés vert désaturé." -->
<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/><style>body{margin:0;padding:18px 20px;background:var(--background);color:var(--on-surface);font-family:var(--font-sans)}.sw{display:flex;gap:10px;flex-wrap:wrap}.chip{border-radius:var(--radius-md);border:1px solid var(--outline);overflow:hidden;width:150px}.chip .c{height:52px}.chip .m{padding:7px 9px;font-size:11px;line-height:1.35}.chip .n{font-weight:600}.chip .h{color:var(--on-surface-muted);font-variant-numeric:tabular-nums}.lbl{font-size:11px;color:var(--on-surface-muted);text-transform:uppercase;letter-spacing:.05em;margin:0 0 10px}</style></head><body><div class="sw">
<div class="chip"><div class="c" style="background:#f7faf9"></div><div class="m"><div class="n">background</div><div class="h">--background</div><div class="h">#f7faf9</div></div></div>
<div class="chip"><div class="c" style="background:#ffffff"></div><div class="m"><div class="n">surface</div><div class="h">--surface</div><div class="h">#ffffff</div></div></div>
<div class="chip"><div class="c" style="background:#f1f5f3"></div><div class="m"><div class="n">surface-variant</div><div class="h">--surface-variant</div><div class="h">#f1f5f3</div></div></div>
<div class="chip"><div class="c" style="background:#0f172a"></div><div class="m"><div class="n">on-surface</div><div class="h">--on-surface</div><div class="h">#0f172a</div></div></div>
<div class="chip"><div class="c" style="background:#5b6b66"></div><div class="m"><div class="n">on-surface-muted</div><div class="h">--on-surface-muted</div><div class="h">#5b6b66</div></div></div>
<div class="chip"><div class="c" style="background:#d6dedb"></div><div class="m"><div class="n">outline</div><div class="h">--outline</div><div class="h">#d6dedb</div></div></div>
</div></body></html>
