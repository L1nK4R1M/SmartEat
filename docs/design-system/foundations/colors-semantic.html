<!-- @dsCard group="Colors" viewport="700x150" name="Sémantique — ambre & erreur" subtitle="Ambre = signal BUDGET uniquement. Rouge = erreur." -->
<!DOCTYPE html><html lang="fr"><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/><style>body{margin:0;padding:18px 20px;background:var(--background);color:var(--on-surface);font-family:var(--font-sans)}.sw{display:flex;gap:10px;flex-wrap:wrap}.chip{border-radius:var(--radius-md);border:1px solid var(--outline);overflow:hidden;width:150px}.chip .c{height:52px}.chip .m{padding:7px 9px;font-size:11px;line-height:1.35}.chip .n{font-weight:600}.chip .h{color:var(--on-surface-muted);font-variant-numeric:tabular-nums}.lbl{font-size:11px;color:var(--on-surface-muted);text-transform:uppercase;letter-spacing:.05em;margin:0 0 10px}</style></head><body><div class="sw">
<div class="chip"><div class="c" style="background:#f59e0b"></div><div class="m"><div class="n">accent (budget)</div><div class="h">--accent</div><div class="h">#f59e0b</div></div></div>
<div class="chip"><div class="c" style="background:var(--accent-tint)"></div><div class="m"><div class="n">accent-tint</div><div class="h">--accent-tint</div><div class="h">15% α</div></div></div>
<div class="chip"><div class="c" style="background:#dc2626"></div><div class="m"><div class="n">error</div><div class="h">--error</div><div class="h">#dc2626</div></div></div>
<div class="chip"><div class="c" style="background:var(--error-tint)"></div><div class="m"><div class="n">error-tint</div><div class="h">--error-tint</div><div class="h">10% α</div></div></div>
</div></body></html>
